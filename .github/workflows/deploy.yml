name: Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Detect what changed ──────────────────────────────────────────
  changes:
    runs-on: ubuntu-latest
    outputs:
      sql: ${{ steps.filter.outputs.sql }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            sql:
              - 'sql/**'

  # ── Deploy SQL schema (tables + procedures) ──────────────────────
  # Only runs when files under sql/ changed.
  deploy-sql:
    needs: changes
    if: needs.changes.outputs.sql == 'true'
    runs-on: ubuntu-latest
    environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'test' }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Snowflake CLI
        run: pip install snowflake-cli

      - name: Write Snowflake connection config
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
        run: |
          mkdir -p ~/.snowflake
          cat > ~/.snowflake/config.toml <<EOF
          [connections.sfcogsops-snowhouse_aws_us_west_2]
          account = "${SNOWFLAKE_ACCOUNT}"
          user = "${SNOWFLAKE_USER}"
          password = "${SNOWFLAKE_PASSWORD}"
          role = "FINOPS_VALUE_ADVISORY_RL"
          warehouse = "FINOPS_WH"

          [connections.default]
          account = "${SNOWFLAKE_ACCOUNT}"
          user = "${SNOWFLAKE_USER}"
          password = "${SNOWFLAKE_PASSWORD}"
          role = "FINOPS_VALUE_ADVISORY_RL"
          warehouse = "FINOPS_WH"
          EOF
          chmod 0600 ~/.snowflake/config.toml

      - name: Deploy SQL to TEST
        if: github.event_name == 'pull_request'
        run: bash sql/deploy.sh FINOPS.L3_TEMPLATE_TEST

      - name: Deploy SQL to LIVE
        if: github.ref == 'refs/heads/main'
        run: bash sql/deploy.sh FINOPS.L3_TEMPLATE

  # ── Deploy Streamlit app ─────────────────────────────────────────
  # Always runs on every push/PR — no sql dependency needed.
  deploy-app:
    runs-on: ubuntu-latest
    environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'test' }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Snowflake CLI
        run: pip install snowflake-cli

      - name: Write Snowflake connection config
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
        run: |
          mkdir -p ~/.snowflake
          cat > ~/.snowflake/config.toml <<EOF
          [connections.sfcogsops-snowhouse_aws_us_west_2]
          account = "${SNOWFLAKE_ACCOUNT}"
          user = "${SNOWFLAKE_USER}"
          password = "${SNOWFLAKE_PASSWORD}"
          role = "FINOPS_VALUE_ADVISORY_RL"
          warehouse = "FINOPS_WH"

          [connections.default]
          account = "${SNOWFLAKE_ACCOUNT}"
          user = "${SNOWFLAKE_USER}"
          password = "${SNOWFLAKE_PASSWORD}"
          role = "FINOPS_VALUE_ADVISORY_RL"
          warehouse = "FINOPS_WH"
          EOF
          chmod 0600 ~/.snowflake/config.toml

      - name: Debug config
        run: cat ~/.snowflake/config.toml | sed 's/password = .*/password = ***/'

      - name: Write Google credentials
        run: |
          echo '${{ secrets.GOOGLE_CREDENTIALS_JSON }}' \
            > l3-finops-app/snowflake-corp-finops-analysis-0152d8301e98.json

      - name: Deploy app to TEST
        if: github.event_name == 'pull_request'
        run: bash l3-finops-app/deploy_container.sh TEST

      - name: Deploy app to PROD
        if: github.ref == 'refs/heads/main'
        run: bash l3-finops-app/deploy_container.sh PROD
